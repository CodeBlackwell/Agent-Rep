services:
  app:
    build: .
    container_name: prove-app
    restart: unless-stopped
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - internal
      - web

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-prove}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-prove}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

volumes:
  neo4j_data:
  app_data:
  app_logs:

networks:
  internal:
  web:
    external: true
    name: web
