services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
    volumes:
      - app_data:/app/data      # SQLite DB (conversations, logs, rate limits)
      - app_logs:/app/logs      # JSON line logs
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - internal
      - web

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-showmeoff}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-showmeoff}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./portfolio:/srv/portfolio:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - web

volumes:
  neo4j_data:
  app_data:
  app_logs:
  caddy_data:
  caddy_config:

networks:
  internal:    # neo4j <-> app only, no external access
  web:         # app <-> caddy, exposed to internet
